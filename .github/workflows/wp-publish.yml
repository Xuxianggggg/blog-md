name: Sync WordPress

on:
  push:
    branches: [ "main" ]
    paths:
      - "posts/**"
      - "tools/**"
      - ".github/workflows/wp-publish.yml"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests markdown

      - name: Sync all posts to WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        run: |
          python tools/wp_sync_all.py --status publish
