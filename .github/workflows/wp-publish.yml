name: Publish to WordPress

on:
  push:
    branches: [ "main" ]
    paths:
      - "posts/**"
      - "tools/**"
      - ".github/workflows/wp-publish.yml"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml markdown

      - name: Publish all markdown files
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        run: |
          find posts -type f -name "*.md" | sort > all_md.txt

          echo "All markdown files:"
          cat all_md.txt

          while IFS= read -r md_file; do
            echo "Publishing: $md_file"
            python tools/wp_publish.py "$md_file" --status publish
          done < all_md.txt
